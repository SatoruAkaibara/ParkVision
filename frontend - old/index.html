<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkVision</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>

<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>ParkVision</h1>
                <span class="status-badge">
                    <span class="pulse-dot"></span> LIVE
                </span>
            </div>
            <p class="subtitle">Floor 1 • Main Garage</p>
        </header>

        <main id="map-container" class="map-wrapper" style="position: relative;">
            <img src="assets/parking_lot.jpg" id="parking-image" alt="Live Parking Feed"
                style="display: block; width: 100%;">

            <canvas id="navigationCanvas"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></canvas>

            <div id="overlay-layer"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            </div>
        </main>

        <footer>
            <div class="stat-item"><span id="vacant-count">--</span><label>Free</label></div>
            <div class="stat-item"><span id="occupied-count">--</span><label>Busy</label></div>
        </footer>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script src="scripts/connection.js" defer></script>

    <script src="scripts/navigation.js" defer></script>
</body>

</body>

</html>
