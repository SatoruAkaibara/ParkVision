<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkVision Admin Tool</title>

    <link rel="stylesheet" href="styles/main.css">

    <link rel="stylesheet" href="styles/admin.css">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>

<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="admin-container">
        <aside class="sidebar">
            <header>
                <h2>Admin Mode</h2>
                <p>Draw parking spots on the camera feed.</p>
            </header>

            <div class="controls">
                <div style="display: flex; gap: 5px; margin-bottom: 15px; width: 100%;">
                    <button class="btn btn-primary" id="modeSpotsBtn" style="flex: 1;">⬛ Spots Mode</button>
                    <button class="btn" id="modePathsBtn" style="flex: 1; background: #333; color: white;">🔗 Paths
                        Mode</button>
                    <button class="btn" onclick="autoGenerateSpotNodes()"
                        style="background: #0A84FF; color: white; width: 100%; margin-bottom: 5px;">
                        ✨ Auto-Generate Nodes
                    </button>
                </div>

                <button class="btn btn-primary" id="saveBtn" style="margin-bottom: 5px;">
                    <span class="material-symbols-rounded">save</span> Save Map
                </button>
                <button class="btn btn-danger" id="clearBtn">
                    <span class="material-symbols-rounded">delete</span> Clear All
                </button>
            </div>

            <div class="spot-header-group">
                <h3>Active Zones</h3>
                <span id="spot-count" class="status-badge"
                    style="background:rgba(255,255,255,0.1); color:white;">0</span>
            </div>

            <div class="spot-list" id="spot-list">
            </div>
        </aside>

        <main class="canvas-area">
            <canvas id="parkingCanvas"></canvas>
            <p id="placeholder-text" style="position: absolute; color: #666; pointer-events: none;">Loading Image...</p>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="scripts/admin.js" defer></script>

</body>

</html>
